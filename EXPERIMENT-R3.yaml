experiment:
  name: "Retro Board — Agentic Web Stack Stress Test (Round 3)"
  date: "2026-04-12"
  model: "claude-opus-4-6 (1M context)"
  template_version: "Same as Round 2 (no new template commits)"
  goal: >
    Maximum efficiency run — same retro board feature, same template,
    aggressive batching strategy targeting <= 5 subagent dispatches.

