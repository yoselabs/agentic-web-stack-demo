  phases:
    - name: "Brainstorming & Design"
      skills: ["superpowers:brainstorming"]
      output: "docs/superpowers/specs/2026-04-12-retro-board-r3-design.md"
      notes: "Fast confirmation pass — requirements identical to R1/R2"

    - name: "Spec Code Review"
      skills: ["superpowers:requesting-code-review"]
      findings: "4 important issues fixed (missing card create optimistic update, enum convention note, route tree regen timing, success criteria wording)"

    - name: "Implementation Planning"
      skills: ["superpowers:writing-plans"]
      output: "docs/superpowers/plans/2026-04-12-retro-board-r3.md"
      tasks: 4
      notes: "Complete code in every step — subagents paste rather than design from scratch"

    - name: "Subagent-Driven Execution"
      skills: ["superpowers:subagent-driven-development"]
      model_strategy: "sonnet for implementation + spec review, sonnet/code-reviewer for quality review, opus for orchestration"

