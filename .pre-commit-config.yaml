repos:
  - repo: local
    hooks:
      - id: harness-fix
        name: auto-fix
        entry: agent-harness fix
        language: system
        pass_filenames: false
        always_run: true

      - id: harness-lint
        name: agent-harness lint
        entry: agent-harness lint
        language: system
        pass_filenames: false
        always_run: true

      - id: typecheck
        name: typecheck
        entry: pnpm -w run typecheck
        language: system
        pass_filenames: false
        always_run: true
